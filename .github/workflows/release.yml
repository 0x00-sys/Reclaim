name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
      - name: Build Release app
        run: |
          xcodebuild -project Reclaim.xcodeproj -scheme Reclaim -configuration Release \
            -derivedDataPath build CODE_SIGNING_ALLOWED=NO build | tail -5
      - name: Ad-hoc sign
        run: |
          codesign --force --deep --sign - "build/Build/Products/Release/Reclaim.app"
          codesign --verify --verbose=2 "build/Build/Products/Release/Reclaim.app"
      - name: Package DMG
        id: dmg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGING="$(mktemp -d)"
          cp -R "build/Build/Products/Release/Reclaim.app" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "Reclaim" -srcfolder "$STAGING" -ov -format UDZO "Reclaim-$VERSION.dmg"
          echo "asset=Reclaim-$VERSION.dmg" >> "$GITHUB_OUTPUT"
          shasum -a 256 "Reclaim-$VERSION.dmg"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.dmg.outputs.asset }}
          generate_release_notes: true
      - name: Print cask checksum
        run: |
          echo "Update homebrew-tap/Casks/reclaim.rb with:"
          echo "  version \"${GITHUB_REF_NAME#v}\""
          shasum -a 256 ${{ steps.dmg.outputs.asset }} | awk '{print "  sha256 \"" $1 "\""}'
